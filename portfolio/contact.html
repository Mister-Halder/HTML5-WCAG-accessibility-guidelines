<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact Me</h1>
</header>

<main>

<section aria-labelledby="contact-heading">

<h2 id="contact-heading">Send a Message</h2>

<form>

<div>
    <label for="name">Name</label>
    <input
        type="text"
        id="name"
        name="name"
        required>
</div>

<div>
    <label for="email">Email Address</label>
    <input
        type="email"
        id="email"
        name="email"
        required>
</div>

<div>
    <label for="message">Message</label>
    <textarea
        id="message"
        name="message"
        rows="6"
        required></textarea>
</div>

<button type="submit">Send Message</button>

</form>

</section>

</main>

<footer>
    <p>&copy; 2026 Debashis</p>
</footer>

</body>
</html>
